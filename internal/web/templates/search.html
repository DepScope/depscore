{{define "content"}}
<link rel="stylesheet" href="/static/search.css" />
<div class="search-page">
  <div class="search-header">
    <h1>Dependency Index</h1>
    <p class="search-subtitle">Search your indexed supply chain</p>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-card"><span class="stat-value" id="stat-manifests">-</span><span class="stat-label">Manifests</span></div>
    <div class="stat-card"><span class="stat-value" id="stat-packages">-</span><span class="stat-label">Packages</span></div>
    <div class="stat-card" id="stat-ecosystems-card"></div>
  </div>

  <div id="risk-dashboard" class="risk-dashboard" style="display:none;"></div>

  <div class="search-tabs">
    <button class="tab active" data-tab="search">Package Search</button>
    <button class="tab" data-tab="compromised">Compromised Check</button>
  </div>

  <div class="tab-content active" id="tab-search">
    <div class="search-input-group">
      <input type="text" id="search-query" class="search-input" placeholder="Search package name (e.g., axios, lodash, requests)..." />
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
  </div>

  <div class="tab-content" id="tab-compromised">
    <div class="search-input-group">
      <textarea id="compromised-input" class="search-textarea" rows="4" placeholder="Enter compromised packages, one per line:&#10;axios@1.14.1&#10;axios@0.30.4&#10;event-stream@>=3.3.4,<3.3.7"></textarea>
      <button class="search-btn" onclick="doCompromisedSearch()">Check</button>
    </div>
  </div>

  <div id="results-area" class="results-area" style="display:none;">
    <div class="results-header">
      <span id="results-count"></span>
      <span id="results-label"></span>
    </div>
    <div id="results-list" class="results-list"></div>
  </div>

  <div id="detail-panel" class="detail-panel" style="display:none;">
    <div class="detail-header">
      <h3 id="detail-title"></h3>
      <button class="detail-close" onclick="closeDetail()">&times;</button>
    </div>
    <div id="detail-content" class="detail-content"></div>
  </div>
</div>
<script src="/static/search.js"></script>
{{end}}
