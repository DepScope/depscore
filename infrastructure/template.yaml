AWSTemplateFormatVersion: '2010-09-09'
Description: depscope - Supply chain reputation scoring

Resources:
  ScanTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: depscope-scans
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource: !GetAtt ScanTable.Arn

  Function:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: depscope
      Runtime: provided.al2023
      Architectures: [arm64]
      Handler: bootstrap
      MemorySize: 512
      Timeout: 60
      ReservedConcurrentExecutions: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref ScanTable
      Code:
        S3Bucket: !Sub 'depscope-deploy-${AWS::AccountId}'
        S3Key: lambda.zip

  FunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref Function
      AuthType: NONE

  FunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Function
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

Outputs:
  FunctionUrl:
    Value: !GetAtt FunctionUrl.FunctionUrl
  TableName:
    Value: !Ref ScanTable
