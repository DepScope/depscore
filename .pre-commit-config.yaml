repos:
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.0
    hooks:
      - id: golangci-lint
        entry: golangci-lint run --fix
        types: [go]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: go-test
        name: go test
        entry: bash -c 'go test ./... -count=1'
        language: system
        pass_filenames: false
        types: [go]

      - id: go-build
        name: go build
        entry: bash -c 'go build ./cmd/depscope'
        language: system
        pass_filenames: false
        types: [go]
